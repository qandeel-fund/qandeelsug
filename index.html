<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق الاقتراحات - فريقنا</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <header>
            <div class="header-logo">
                <!-- تأكدي أن اسم الصورة متطابق تماماً مع الملف المرفوع في جيت هوب -->
                <img src="شفاف%20%20قنديل.png" alt="شعار قنديل" class="logo-img">
            </div>
            <h1>صنـدوق اقتراحـات قنديـل 🕯️</h1>
            <p>رأيــكـــــــم يهمنــــــا لنـــرتــقــــــي مـعًـــــــا </p>
        </header>

        <section class="form-section">
            <form id="suggestionForm">
                <div class="input-group">
                    <label for="name">اسمك الكريم:</label>
                    <input type="text" id="name" name="name" placeholder="مثال: حسنـاء" required>
                </div>

                <div class="input-group">
                    <label for="suggestion">اقتراحك أو فكرتك المتميزة:</label>
                    <textarea id="suggestion" name="suggestion" placeholder="اكتب اقتراحك هنا..." required></textarea>
                </div>

                <button type="submit" id="submitBtn">إرسـال الاقتـراح </button>
            </form>

            <div id="messageStatus" class="status-message"></div>
        </section>
    </div>

    <!-- كود الجافا سكريبت الذكي للإرسال المباشر بدون بايثون -->
    <!-- كود الجافا سكريبت المحدث والجاهز للتشغيل المباشر -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const suggestionForm = document.getElementById('suggestionForm');

        if (suggestionForm) {
            suggestionForm.addEventListener('submit', function(e) {
                e.preventDefault(); 

                const nameInput = document.getElementById('name').value;
                const suggestionInput = document.getElementById('suggestion').value;
                const messageStatus = document.getElementById('messageStatus');

                messageStatus.textContent = "جاري إرسال اقتراحك المتميز .. ✨";
                messageStatus.style.color = "#333";
                messageStatus.style.display = "block";

                // 1️⃣ إرسال البيانات المباشر إلى تليجرام
                const token = "8451586120:AAEEaShsVb1GvLeyVNsTJ77bYsipM6IBbkk";
                const chatId = "1999709827";
                const text = `📥 **وصلك اقتراح جديد من الجوال!**\n\n👤 **المرسل:** ${nameInput}\n💡 **المحتوى:**\n${suggestionInput}`;

                const telegramPromise = fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
                });

                // 2️⃣ إرسال البيانات إلى جدول إكسل أونلاين الخاص بكِ عبر SheetMonkey
                const sheetMonkeyURL = "https://api.sheetmonkey.io/form/7jgJLekCh26Qazdn34NjBs";
                
                const excelPromise = fetch(sheetMonkeyURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "التاريخ والوقت": new Date().toLocaleString('ar-EG'),
                        "اسم المرسل": nameInput,
                        "الاقتراح": suggestionInput
                    })
                });

                // 3️⃣ التحقق من نجاح العمليتين معاً وتحديث الـ UI
                Promise.all([telegramPromise, excelPromise])
                .then(([teleRes, excelRes]) => {
                    if (teleRes.ok) {
                        messageStatus.textContent = "تم إرسال اقتراحك بنجاح ! 📥";
                        messageStatus.style.color = "#2A5647"; 
                        suggestionForm.reset(); 
                    } else {
                        throw new Error('فشل في الإرسال');
                    }
                })
                .catch(error => {
                    console.error('خطأ:', error);
                    messageStatus.textContent = "عذراً، حدثت مشكلة أثناء الإرسال. ❌";
                    messageStatus.style.color = "red";
                });
            });
        }
    });
</script>

            <i class="fa-brands fa-tiktok"></i>
            </a>
            <a href="https://chat.whatsapp.com/KPNoigsbJTEI9pqOmeyUr5?mode=gi_t" target="_blank" title="القروب العام" class="footer-icon-link join-icon">
